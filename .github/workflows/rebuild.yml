name: Rebuild & Deploy

on:
  # Primary: fired by the upstream repo (terminal-bench-science) the moment a
  # PR / discussion / review / label changes — see its notify-dashboard.yml.
  repository_dispatch:
    types: [upstream-changed]
  # Backup: a slow safety-net poll in case an upstream event is ever missed.
  # (GitHub heavily throttles short cron intervals, so a tight */15 isn't
  # honoured anyway — hourly is what it reliably runs.)
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch upstream PRs + proposals
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/fetch_data.py --out public/data.json

      - run: npm run build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
